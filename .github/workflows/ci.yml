name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    name: Backend - Lint Test Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: ankane/pgvector
        env:
          POSTGRES_DB: docmind_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/docmind_test
      GEMINI_API_KEY: test-key
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_KEY: test-key
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest
      - name: Lint
        run: ruff check . --ignore E501,E402
      - name: Unit tests
        run: pytest tests/test_core.py -v
      - name: Docker build check
        run: docker build -t docmind-api-test . --quiet

  frontend-ci:
    name: Frontend - TypeCheck Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000/api
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  deploy:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Summary
        run: |
          echo "All CI checks passed"
          echo "Backend deploying to Render via GitHub integration"
          echo "Frontend deploying to Vercel via GitHub integration"
